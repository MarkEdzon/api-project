<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Header: Pokémon Explorer</h1>
        <div class="search-box">
            <input type="text" id="pokemon-input" placeholder="Mag-type ng pangalan ng Pokémon (e.g., pikachu, charizard)...">
            <button id="search-btn">Hanapin</button>
        </div>

        <!-- Dito lalabas ang data ng Pokémon o ang Error Message -->
        <div id="result-container">
            <p class="placeholder-text">Maghanap ng Pokémon para makita ang detalye.</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
