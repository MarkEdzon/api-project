<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Pokémon Explorer</h1>

    <p class="subtitle">
        Search any Pokémon and explore its information using the PokéAPI.
    </p>

    <div class="search-box">
        <input
            type="text"
            id="pokemon-input"
            placeholder="Enter Pokémon name..."
        >

        <button id="search-btn">
            Search
        </button>

        <button id="random-btn">
            Random
        </button>
    </div>

    <div id="result-container">

        <p class="placeholder">
            Search a Pokémon to see its details.
        </p>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
